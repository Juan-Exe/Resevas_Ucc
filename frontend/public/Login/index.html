<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Reservas UCC</title>
    <link rel="stylesheet" href="L-styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <div class="login-container">
            <div class="login-box">
                <div class="login-header">
                    <h1>Sistema de reservas UCC</h1>
                    <h2>Iniciar Sesión</h2>
                </div>
                
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="email">Correo Institucional</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="correo@ucc.edu.co"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Ingrese su contraseña"
                            required
                        >
                    </div>

                    <div class="form-group-checkbox">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Recordarme</label>
                    </div>

                    <div class="error-message" id="error-message"></div>

                    <button type="submit" class="btn-login">Iniciar Sesión</button>

                    <div class="forgot-password">
                        <a href="#" id="link-recuperar">¿Olvidaste tu contraseña?</a>
                    </div>

                    <div class="login-footer">
                        <p>¿No tienes cuenta? <a href="../SeleccionRol/index.html">Regístrate aquí</a></p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal de envío de código -->
        <div id="modal-recuperacion" class="modal-overlay">
            <div class="modal-content">
                <div class="loader"></div>
                <h3>Código de verificación enviado</h3>
                <p>Se ha enviado un código de 6 dígitos a:</p>
                <p class="email-destino" id="email-destino-modal"></p>
                <p class="nota-modal">Revisa tu bandeja de entrada y spam</p>
            </div>
        </div>
    </main>
    <script src="login.js"></script>
</body>

</html>
