<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas UCC</title>
    <link rel="stylesheet" href="I-styles/styles.css">
    <link rel="stylesheet" href="I-styles/header.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">

<body>
    <!-- Header Institucional UCC -->
    <header class="header-ucc">
        <div class="header-content">
            <div class="header-logo">
                <img src="I-img/Logo Ucc/logo_ucc_2018(CURVAS)-01.jpg" alt="Universidad Cooperativa de Colombia">
            </div>
            <div class="header-welcome">
                <h1>
                    <span class="welcome-main">Sistema de Reservas UCC</span>
                    <span class="welcome-sub">Universidad Cooperativa de Colombia</span>
                </h1>
            </div>
            <div class="header-decoration"></div>
        </div>
    </header>
    <main>
        <div class="res-cont-cont">
            <div class="res-lkn-cont">
                <div class="res-prof-cont">
                    <div class="res-prof-img">
                        <img src="I-img/default-avatar.svg" alt="avatar">
                    </div>
                    <div class="res-prof-lab">
                        <label for="">Arrieta Herrera, Juan</label>
                        <label for="">juan.arrietah</label>
                    </div>
                </div>

                <h2>Sistema de reservas ucc.</h2>
                <a href="index.html">Reservas</a>
                <a href="Gestion/index.html">Gestion</a>
                <a href="Perfil/index.html">Perfil</a>
            </div>
            <div class="res-tit-form-cont">
                <div class="res-tit-cont">
                    <h1>Bienvenido al sistema de reservas Ucc.</h1>
                </div>
                <div class="res-form-cont">
                    <label for="">Selecciona el piso</label>
                    <div class="custom-select-container">
                        <div class="custom-select-trigger">
                            <img src="I-img/Assets svg/Down arrow.svg" alt="arrow">
                        </div>
                        <div class="custom-options">
                            <div class="custom-option-header">Piso</div>
                            <div class="custom-option" data-value="1">1</div>
                            <div class="custom-option" data-value="2">2</div>
                            <div class="custom-option" data-value="3">3</div>
                            <div class="custom-option" data-value="4">4</div>
                            <div class="custom-option" data-value="5">5</div>
                            <div class="custom-option" data-value="6">6</div>
                        </div>
                    </div>
                </div>
                <form action="">
                    <h2>Diligencie los datos del espacio a reservar.</h2>
                    <div id="dynamic-form-container"><label id="no-floor-selected">no se ha seleccionado ningun
                            piso</label></div>
                </form>
                <p class="desc-esp"></p>
                <div class="btn-ctn hidden">
                    <button class="res-btn" id="reservar-btn">Reservar</button>
                </div>
            </div>

            <div class="res-fech-hr-cont">
                <div class="res-lab-svg">
                    <label for="">Fecha a reserva</label>
                    <img src="I-img/Assets svg/Down arrow.svg" alt="">
                </div>
                <div class="res-fech">
                    <div class="res-fech-h3-svg">
                        <div class="date-display">
                            <span id="month-name">Octubre</span>
                        </div>
                        <img src="I-img/Assets svg/Down arrow.svg" alt="arrow">
                        <div id="month-options-popup" class="custom-options">
                            <!-- Opciones de mes se generan con JS -->
                        </div>
                    </div>
                    <div class="res-fech-day">
                        <!-- Días se generan con JS -->
                    </div>
                </div>
                <div class="hour-cont">
                    <label>Hora a reservar.</label>
                </div>
                <div class="btn-cont">
                    <button>6:00am a 9:00am</button>
                    <button>9:00am a 12:00pm</button>
                    <button>12:00pm a 3:00pm</button>
                    <button>3:00pm a 6:00pm</button>
                    <button>6:00pm a 9:00pm</button>
                </div>
                <div class="evnt-mot">
                    <label for="">Motivo de la reserva</label>
                    <textarea name="" id="reason-textarea" cols="30" rows="10"
                        placeholder="Escriba el motivo de la reserva..."></textarea>
                    <label for="">max 500 caracteres.*</label>
                </div>
            </div>
        </div>
    </main>
    <script src="I-scripts/header-scroll.js"></script>
    <script src="check-auth.js"></script>
    <script src="notificaciones.js"></script>
    <script src="main.js"></script>
</body>

</html>
