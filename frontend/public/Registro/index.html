<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Reservas UCC</title>
    <link rel="stylesheet" href="R-styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <div class="registro-container">
            <div class="registro-box">
                <div class="registro-header">
                    <h1>Sistema de reservas UCC</h1>
                    <h2>Crear Cuenta</h2>
                    <p class="rol-seleccionado" id="rol-display"></p>
                </div>

                <form id="registro-form" class="registro-form">
                    <input type="hidden" id="rol" name="rol" value="">
                    <div class="form-group">
                        <label for="nombre_completo">Nombre Completo</label>
                        <input 
                            type="text" 
                            id="nombre_completo" 
                            name="nombre_completo" 
                            placeholder="Apellidos, Nombre"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="nombre_usuario">Nombre de Usuario</label>
                        <input 
                            type="text" 
                            id="nombre_usuario" 
                            name="nombre_usuario" 
                            placeholder="usuario.apellido"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Institucional</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="correo@ucc.edu.co"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Mínimo 6 caracteres"
                            required
                            minlength="6"
                        >
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">Confirmar Contraseña</label>
                        <input 
                            type="password" 
                            id="confirm_password" 
                            name="confirm_password" 
                            placeholder="Repita su contraseña"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="imagen_perfil">Foto de Perfil (Opcional)</label>
                        <input 
                            type="file" 
                            id="imagen_perfil" 
                            name="imagen_perfil" 
                            accept="image/*"
                        >
                        <div class="preview-container">
                            <img id="preview" src="" alt="Vista previa" style="display: none;">
                        </div>
                    </div>

                    <div class="error-message" id="error-message"></div>
                    <div class="success-message" id="success-message"></div>

                    <button type="submit" class="btn-registro">Crear Cuenta</button>

                    <div class="registro-footer">
                        <p>¿Ya tienes cuenta? <a href="../Login/index.html">Inicia sesión aquí</a></p>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="registro.js"></script>
</body>

</html>
