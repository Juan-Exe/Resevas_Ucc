<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Rol - Reservas UCC</title>
    <link rel="stylesheet" href="S-styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <div class="seleccion-container">
            <div class="seleccion-box">
                <div class="seleccion-header">
                    <h1>Sistema de reservas UCC</h1>
                    <h2>¿Cómo deseas registrarte?</h2>
                    <p class="subtitle">Selecciona tu tipo de usuario</p>
                </div>

                <div class="roles-container">
                    <div class="role-card" data-rol="Estudiante">
                        <div class="role-icon">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 3L1 9L12 15L21 10.09V17H23V9L12 3Z" fill="#006FBF"/>
                                <path d="M5 13.18V17.18C5 17.97 7.69 20 12 20C16.31 20 19 17.97 19 17.18V13.18L12 17L5 13.18Z" fill="#006FBF"/>
                            </svg>
                        </div>
                        <h3>Estudiante</h3>
                        <p>Registrarme como estudiante de la Universidad Cooperativa de Colombia</p>
                    </div>

                    <div class="role-card" data-rol="Profesor">
                        <div class="role-icon">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12Z" fill="#006FBF"/>
                                <path d="M12 14C8.67 14 2 15.67 2 19V21H22V19C22 15.67 15.33 14 12 14Z" fill="#006FBF"/>
                                <path d="M19 8H17V10H19V12H21V10H23V8H21V6H19V8Z" fill="#006FBF"/>
                            </svg>
                        </div>
                        <h3>Profesor</h3>
                        <p>Registrarme como docente de la Universidad Cooperativa de Colombia</p>
                    </div>
                </div>

                <div class="seleccion-footer">
                    <p>¿Ya tienes cuenta? <a href="../Login/index.html">Inicia sesión aquí</a></p>
                </div>
            </div>
        </div>
    </main>
    <script src="seleccion.js"></script>
</body>

</html>
